spring.webflux.base-path=/ifm

# Circuit breaker agresivo para pruebas de apertura del circuito
resilience4j.circuitbreaker.configs.default.sliding-window-size=2
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=2
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=1
resilience4j.circuitbreaker.configs.default.ignore-exceptions=com.pyg.ifm.exception.BusinessApiException

spring.cloud.circuitbreaker.resilience4j.disable-time-limiter=true
